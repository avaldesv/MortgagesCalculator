openapi: 3.0.3
info:
  title: MortgageCalc API
  version: 0.1.0
  description: |
    API v0.1 for MortgageCalc (U.S. mortgage calculator). GATE-1 deliverable for P0-A.

    Estimates only — not a loan offer. See docs/compliance.md (P0-A).

    ## Ownership

    | Resource | Frontend | Backend |
    |----------|----------|---------|
    | Health | — | BE |
    | Auth login | Admin UI | BE |
    | Ad placements (active) | ModularPageLayout | BE |
    | Ad placements (admin) | Admin UI | BE |
    | Listings (public) | Homes tab, M-listings-ad | BE |
    | Listings (admin) | Admin UI | BE |
    | Partner leads | Partners tab | BE |

    ## Ads

    - Max one active placement per `position` per tab; highest `priority` wins.
    - `enabled: false` → not returned from active endpoint.

    ## Rate limit

    `POST /api/v1/leads/partner`: 10 requests/minute per client IP.

  contact:
    name: MortgageCalc Platform
  license:
    name: Proprietary
    url: https://github.com/avaldesv/MortgagesCalculator

servers:
  - url: https://backend-production-dbaf7.up.railway.app
    description: Production API (Railway)
  - url: http://localhost:3000
    description: Local NestJS development

tags:
  - name: Health
  - name: Auth
  - name: AdPlacements
  - name: Listings
  - name: Leads

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                version: 0.1.0
                timestamp: '2026-05-24T12:00:00.000Z'
        '400':
          description: Bad request
        '503':
          description: Service unavailable
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Admin login
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@mortgagecalc.app
              password: changeme123
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                expiresIn: 3600
                tokenType: Bearer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_CREDENTIALS
                message: Email or password is incorrect.
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/ad-placements/active:
    get:
      tags: [AdPlacements]
      summary: Active placements for tab (public)
      operationId: getActiveAdPlacements
      security: []
      parameters:
        - $ref: '#/components/parameters/TabIdQuery'
      responses:
        '200':
          description: Deduplicated active placements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveAdPlacementsResponse'
              example:
                tabId: simple-calculator
                placements:
                  - id: slot-simple-right
                    enabled: true
                    position: middle-right
                    tabs:
                      - simple-calculator
                      - advanced-calculator
                    maxListings: 2
                    sponsoredLabel: Sponsored
                    priority: 10
                    updatedAt: '2026-05-24T10:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/ad-placements:
    get:
      tags: [AdPlacements]
      summary: List all placements (admin)
      operationId: listAdPlacements
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All placements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdPlacementListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [AdPlacements]
      summary: Create placement (admin)
      operationId: createAdPlacement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdPlacementCreateRequest'
            example:
              id: slot-footer-homes
              enabled: true
              position: footer
              tabs:
                - homes-by-payment
              maxListings: 4
              sponsoredLabel: Sponsored Home
              priority: 5
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdPlacement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Placement id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: PLACEMENT_ID_CONFLICT
                message: Placement id already exists.
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/ad-placements/{placementId}:
    parameters:
      - $ref: '#/components/parameters/PlacementIdPath'
    get:
      tags: [AdPlacements]
      summary: Get placement (admin)
      operationId: getAdPlacement
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Placement found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdPlacement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [AdPlacements]
      summary: Update placement (admin)
      operationId: updateAdPlacement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdPlacementUpdateRequest'
            example:
              enabled: false
      responses:
        '200':
          description: Placement updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdPlacement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [AdPlacements]
      summary: Delete placement (admin)
      operationId: deleteAdPlacement
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/listings:
    get:
      tags: [Listings]
      summary: Public sponsored listings
      operationId: listPublicListings
      security: []
      parameters:
        - name: sponsored
          in: query
          required: true
          schema:
            type: boolean
            enum: [true]
        - name: zip
          in: query
          schema:
            type: string
            pattern: '^\d{5}(-\d{4})?$'
          example: '32801'
        - name: maxPayment
          in: query
          description: Returns listings where estimatedMonthlyPayment <= maxPayment * 1.1
          schema:
            type: number
            minimum: 0
          example: 2800
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Paginated sponsored listings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListingsResponse'
              example:
                data:
                  - id: lst-1
                    price: 425000
                    city: Orlando
                    state: FL
                    estimatedMonthlyPayment: 2780
                    bedrooms: 3
                    bathrooms: 2
                    squareFeet: 1850
                    agentOrCompany: Sunshine Realty Group
                    listingUrl: https://example.com/listing/1
                    zip: '32801'
                    active: true
                meta:
                  page: 1
                  pageSize: 20
                  total: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/listings:
    get:
      tags: [Listings]
      summary: List listings (admin)
      operationId: listAdminListings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated listings (admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Listings]
      summary: Create listing (admin)
      operationId: createListing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsoredListingCreateRequest'
      responses:
        '201':
          description: Listing created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsoredListing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/listings/{listingId}:
    parameters:
      - $ref: '#/components/parameters/ListingIdPath'
    patch:
      tags: [Listings]
      summary: Update listing (admin)
      operationId: updateListing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsoredListingUpdateRequest'
      responses:
        '200':
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsoredListing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Listings]
      summary: Delete listing (admin)
      operationId: deleteListing
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/leads/partner:
    post:
      tags: [Leads]
      summary: Submit partner lead
      operationId: createPartnerLead
      description: Rate limit 10 req/min per IP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerLeadRequest'
            example:
              name: Jane Agent
              company: Sunshine Realty Group
              email: jane@sunshine.example
              phone: '+1-407-555-0100'
              serviceType: real_estate_agent
              targetRegion: Orlando, FL
              monthlyBudget: 500
              message: Interested in sponsored listings.
              consentContact: true
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerLeadResponse'
              example:
                id: lead-7f3a2b1c
                status: received
                createdAt: '2026-05-24T12:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Obtain via POST /api/v1/auth/login. Required for /api/v1/admin/*.

  parameters:
    TabIdQuery:
      name: tab
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/TabId'
    PlacementIdPath:
      name: placementId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    ListingIdPath:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Invalid request
            details:
              - field: tab
                message: tab is required
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Authentication required
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: Admin role required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: Resource not found
    TooManyRequests:
      description: Rate limit exceeded (10/min per IP on this endpoint)
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until retry
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitErrorResponse'
          example:
            code: RATE_LIMIT_EXCEEDED
            message: Too many requests
            retryAfter: 42
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: An unexpected error occurred

  schemas:
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - PLACEMENT_ID_CONFLICT
            - INVALID_CREDENTIALS
            - RATE_LIMIT_EXCEEDED
            - INTERNAL_ERROR
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationDetail'

    RateLimitErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [retryAfter]
          properties:
            retryAfter:
              type: integer
              minimum: 1

    ValidationDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [accessToken, expiresIn, tokenType]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          minimum: 1
          example: 3600
        tokenType:
          type: string
          enum: [Bearer]

    TabId:
      type: string
      enum:
        - simple-calculator
        - advanced-calculator
        - affordability
        - compare-scenarios
        - homes-by-payment
        - learning-center
        - partners

    AdPagePosition:
      type: string
      enum:
        - top-left
        - top-center
        - top-right
        - middle-left
        - middle-center
        - middle-right
        - bottom-left
        - bottom-center
        - bottom-right
        - footer

    TabsTarget:
      oneOf:
        - type: string
          enum: [all]
        - type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TabId'

    AdPlacement:
      type: object
      required: [id, enabled, position, tabs]
      properties:
        id:
          type: string
          maxLength: 64
        enabled:
          type: boolean
        position:
          $ref: '#/components/schemas/AdPagePosition'
        tabs:
          $ref: '#/components/schemas/TabsTarget'
        maxListings:
          type: integer
          minimum: 1
          maximum: 12
          default: 3
        sponsoredLabel:
          type: string
          maxLength: 64
          default: Sponsored
        priority:
          type: integer
          minimum: 0
          maximum: 999
          default: 0
        updatedAt:
          type: string
          format: date-time

    AdPlacementCreateRequest:
      type: object
      required: [id, enabled, position, tabs]
      properties:
        id:
          type: string
          maxLength: 64
        enabled:
          type: boolean
        position:
          $ref: '#/components/schemas/AdPagePosition'
        tabs:
          $ref: '#/components/schemas/TabsTarget'
        maxListings:
          type: integer
          minimum: 1
          maximum: 12
        sponsoredLabel:
          type: string
          maxLength: 64
        priority:
          type: integer
          minimum: 0
          maximum: 999

    AdPlacementUpdateRequest:
      type: object
      minProperties: 1
      properties:
        enabled:
          type: boolean
        position:
          $ref: '#/components/schemas/AdPagePosition'
        tabs:
          $ref: '#/components/schemas/TabsTarget'
        maxListings:
          type: integer
          minimum: 1
          maximum: 12
        sponsoredLabel:
          type: string
          maxLength: 64
        priority:
          type: integer
          minimum: 0
          maximum: 999

    ActiveAdPlacementsResponse:
      type: object
      required: [tabId, placements]
      properties:
        tabId:
          $ref: '#/components/schemas/TabId'
        placements:
          type: array
          items:
            $ref: '#/components/schemas/AdPlacement'

    AdPlacementListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdPlacement'

    SponsoredListing:
      type: object
      required:
        - id
        - price
        - city
        - state
        - estimatedMonthlyPayment
        - bedrooms
        - bathrooms
        - squareFeet
        - agentOrCompany
        - listingUrl
        - active
      properties:
        id:
          type: string
        price:
          type: number
          minimum: 0
        city:
          type: string
          maxLength: 120
        state:
          type: string
          minLength: 2
          maxLength: 2
        estimatedMonthlyPayment:
          type: number
          minimum: 0
        bedrooms:
          type: integer
          minimum: 0
          maximum: 20
        bathrooms:
          type: number
          minimum: 0
          maximum: 20
        squareFeet:
          type: integer
          minimum: 0
        agentOrCompany:
          type: string
          maxLength: 200
        listingUrl:
          type: string
          format: uri
          maxLength: 2048
        zip:
          type: string
          pattern: '^\d{5}(-\d{4})?$'
        active:
          type: boolean

    SponsoredListingCreateRequest:
      type: object
      required:
        - price
        - city
        - state
        - estimatedMonthlyPayment
        - bedrooms
        - bathrooms
        - squareFeet
        - agentOrCompany
        - listingUrl
      properties:
        id:
          type: string
        price:
          type: number
          minimum: 0
        city:
          type: string
        state:
          type: string
          minLength: 2
          maxLength: 2
        estimatedMonthlyPayment:
          type: number
          minimum: 0
        bedrooms:
          type: integer
          minimum: 0
        bathrooms:
          type: number
          minimum: 0
        squareFeet:
          type: integer
          minimum: 0
        agentOrCompany:
          type: string
        listingUrl:
          type: string
          format: uri
        zip:
          type: string
        active:
          type: boolean
          default: true

    SponsoredListingUpdateRequest:
      type: object
      minProperties: 1
      properties:
        price:
          type: number
          minimum: 0
        city:
          type: string
        state:
          type: string
        estimatedMonthlyPayment:
          type: number
          minimum: 0
        bedrooms:
          type: integer
        bathrooms:
          type: number
        squareFeet:
          type: integer
        agentOrCompany:
          type: string
        listingUrl:
          type: string
          format: uri
        zip:
          type: string
        active:
          type: boolean

    PaginationMeta:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
        total:
          type: integer
          minimum: 0

    PaginatedListingsResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SponsoredListing'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ServiceType:
      type: string
      enum:
        - real_estate_agent
        - mortgage_broker
        - mortgage_lender
        - insurance
        - moving
        - home_warranty
        - solar
        - internet
        - title
        - home_inspector
        - other

    PartnerLeadRequest:
      type: object
      required: [name, company, email, phone, serviceType, targetRegion, consentContact]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        company:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          minLength: 7
          maxLength: 32
        serviceType:
          $ref: '#/components/schemas/ServiceType'
        targetRegion:
          type: string
          minLength: 2
          maxLength: 200
        monthlyBudget:
          type: number
          minimum: 0
          maximum: 1000000
        message:
          type: string
          maxLength: 4000
        consentContact:
          type: boolean
          description: Must be true

    PartnerLeadResponse:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [received]
        createdAt:
          type: string
          format: date-time
